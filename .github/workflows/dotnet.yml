name: CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  # Major bump 4.1 -> 5.0: multi-page SDF glyph atlas. The atlas is now a list of fixed-size
  # page textures (default 2048²); a full page appends a new page instead of reallocating, so
  # glyph-atlas growth no longer does a vkDeviceWaitIdle + image realloc + re-upload (the visible
  # frame stall). Internal change to VkSdfFontAtlas + the SDF draw path; the public VkRenderer API
  # is source-compatible (the optional sdfInitialAtlasDim param now sizes a page).
  # 5.1: VkRenderer overrides DIR.Lib's PushClip/PopClip → Vulkan scissor (needs DIR.Lib >= 4.4).
  # 6.0: multi-window — one VulkanDevice shared across windows (SdlVulkanApp); VulkanContext split into
  #      device-level (VulkanDevice) + per-window state; multi-window SdlEventLoop. Breaking: standalone
  #      consumers move to SdlVulkanApp. Adds opt-in SDF glyph disk cache + window placement/morph API.
  # 6.4: rebuilt against DIR.Lib 5.0 (layout engine + PixelMenuWidget); removes VkMenuWidget
  #      (superseded by DIR.Lib's surface-agnostic PixelMenuWidget).
  # 6.5: live-device thumbnail capture (VulkanContext.ThumbnailCapture + VkRenderer
  #      BeginThumbnailCapture/EndThumbnailCapture/TryGetThumbnailCapture) — re-issues already-
  #      tessellated geometry into an offscreen target at thumbnail scale, non-blocking readback.
  #      Plus SDF atlas per-page LRU eviction (replaces EvictAll thrash) + bounded disk-load drain.
  # 6.7: lockstep rebuild against DIR.Lib 6.0 (layout namespace + Layout.Builder DSL).
  # 6.8: inspector render-thread watchdog -- render_liveness MCP tool + ProbeRenderAsync (ALIVE/BLOCKED/DEAD
  #      via a short-budget ping that round-trips ON the render thread; detects a wedged render loop).
  # 6.9: inspector describe_layout MCP tool -- serializes the FULL arranged DIR.Lib.Layout tree (depth +
  #      kind + rect + content/bg/hit chrome), not just the clickable subset describe_ui shows. Needs
  #      DIR.Lib's ArrangedNode.Depth + PixelWidgetBase.GetCapturedLayout + LayoutInspection (DIR.Lib 6.0.x).
  # 6.15: shaped-text GID-direct atlas fetch. DrawText/MeasureText now honor ShapedGlyph.Glyph (the
  #       substituted glyph id from an ITextShaper -- GSUB ligatures, Arabic joined forms, ...),
  #       fetching the SDF/bitmap atlas by glyph id instead of the source codepoint. Adds
  #       VkFontAtlas/VkSdfFontAtlas.GetGlyphByGid + VkRenderer.PreWarmSdfGlyphByGid. Opt-in via
  #       renderer.TextShaper (e.g. DIR.Lib.Shaping's ShapingTextShaper); the default AdvanceShaper
  #       per-rune path is byte-identical to before. Bumps DIR.Lib pin 6.5 -> 6.6.
  # 6.16: re-pin DIR.Lib 6.6 -> 6.8. DIR.Lib 6.8's DIR.Lib.Shaping satellite is rebuilt against
  #       SharpAstro.Fonts.Shaping 1.5.551 (Fonts.Lib F6 zero-alloc bidi + F7 HarfBuzz-style
  #       coverage-digest lookup skipping, ~3-4x faster shaping). Renderer core is unchanged; apps
  #       that plug DIR.Lib.Shaping's ShapingTextShaper into renderer.TextShaper get the speedup.
  # 6.17: GPU-wedge resilience. Stuck-fence recovery now runs on a sacrificial background task the
  #       render thread only polls (on a truly hung GPU the driver can block INSIDE vkFreeMemory /
  #       teardown — observed on Adreno: the old synchronous recovery froze the render thread
  #       permanently); deadline blown or repeated stuck escalations → OnGpuWedged (new host
  #       callback) + clean loop stop. SDF atlas: per-frame upload BYTE budget alongside the glyph
  #       count cap (MTSDF quadrupled bytes/glyph vs R8), one-frame quarantine for glyphs on a
  #       just-appended page (first transition and first sample no longer share a submission), and
  #       a FrameStats wedge breadcrumb logged at fence-stuck escalation.
  # 6.18: idle the render loop while a window is minimized. A minimized window reports a non-zero
  #       pixel size on Windows, so the old size guard never caught it and the loop busy-spun through
  #       swapchain recreation (~270ms/frame) for invisible frames. Gate redraw on the SDL minimized
  #       flag (SdlVulkanWindow.IsMinimized): ~0% CPU while minimized, instant repaint on restore.
  #       DEBUG-only: inspector minimize/maximize/restore commands + a per-iteration command pump
  #       (SdlEventLoop.OnLoopIteration) so commands drain on a minimized window.
  # 6.19: opt-in Vulkan validation diagnostics (VulkanValidation). The Khronos validation layer's
  #       output was previously enabled in DEBUG but dropped to the loader's default sink; now a
  #       debug-utils messenger routes it to a prefixed stderr line + a bounded ring buffer. Adds an
  #       opt-in SYNCHRONIZATION validation switch (the GPU memory-hazard checker behind the wedge
  #       class) and a validation_report inspector/MCP tool. Gated: DEBUG or SDLVK_VALIDATION=1
  #       (+ SDLVK_SYNC_VALIDATION=1 for sync); zero cost + no layer in a normal Release build.
  VERSION_PREFIX: 6.23.${{ github.run_number }}
  VERSION_REV: ${{ github.run_attempt }}
  VERSION_HASH: +${{ github.sha }}
  BUILD_CONF: Release

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x
    - name: Install Android workload
      # The package multi-targets net10.0-android (SdlVulkanActivity host); restore resolves all TFMs,
      # so it needs the android workload. ubuntu runners already ship the Android SDK + JDK.
      run: dotnet workload install android
    - name: Restore dependencies
      run: dotnet restore
    - name: Build
      run: dotnet build -c $BUILD_CONF --no-restore -p:Version=${VERSION_PREFIX}${VERSION_REV}${VERSION_HASH} -p:FileVersion=${VERSION_PREFIX}.${VERSION_REV} -p:ContinuousIntegrationBuild=true
    - name: Upload NuGet package
      uses: actions/upload-artifact@v4
      with:
        name: nuget-packages
        path: '**/*.nupkg'
        retention-days: 5

  # BlendOpRegressionTests catch the dangling-pAttachments bug fixed in 3.4.471 by
  # round-tripping VkBlendOp.Min / Max through actual draw calls. Need a Vulkan ICD on the
  # runner; Mesa lavapipe (software) is the standard headless choice. fail-fast: false so a
  # regression on one architecture doesn't mask the other.
  #
  # vulkan-validationlayers is installed too so SyncValidationGlyphFloodTests runs (not skips):
  # it renders an SDF glyph flood offscreen under VK_LAYER_KHRONOS_validation with SYNCHRONIZATION
  # validation on and asserts no read-after-write hazard. Sync validation flags the atlas
  # upload/sample hazard STATICALLY, so lavapipe reproduces it deterministically where the vendor
  # hang (Adreno) never would. timeout-minutes bounds a genuine wedge (the test has its own
  # 60s in-process deadman on top).
  test:
    needs: build
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        runner: [ubuntu-latest, ubuntu-24.04-arm]
    runs-on: ${{ matrix.runner }}
    steps:
    - uses: actions/checkout@v4
    - uses: SharpAstro/cache-apt-pkgs-action@v1
      with:
        packages: mesa-vulkan-drivers libvulkan1 vulkan-tools vulkan-validationlayers
        version: 1.1
    # If the loader can't enumerate at least one ICD, the tests will Assert.Skip via
    # TryCreateOffscreenContext rather than fail. This diagnostic surfaces that situation
    # (and whether the validation layer is present, for the sync-validation test) in the build
    # log without a re-run.
    - name: Vulkan ICD + layer summary
      run: |
        vulkaninfo --summary || true
        echo "--- instance layers ---"
        vulkaninfo 2>/dev/null | grep -iA1 "VK_LAYER_KHRONOS_validation" || echo "validation layer NOT visible to loader"
    - uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x
    - name: Install Android workload
      # The package multi-targets net10.0-android (SdlVulkanActivity host); restore resolves all TFMs,
      # so it needs the android workload. ubuntu runners already ship the Android SDK + JDK.
      run: dotnet workload install android
    - name: Restore dependencies
      run: dotnet restore
    - name: Build
      run: dotnet build -c $BUILD_CONF --no-restore -p:Version=${VERSION_PREFIX}${VERSION_REV}${VERSION_HASH} -p:FileVersion=${VERSION_PREFIX}.${VERSION_REV} -p:ContinuousIntegrationBuild=true
    - name: Test
      run: dotnet test src/SdlVulkan.Renderer.Tests -c $BUILD_CONF --no-build --logger "console;verbosity=detailed"

  # Headless functional smoke for the Linux WebView backend (GtkWebView / WebKitGTK). Runs two
  # network-free self-tests (tools/WebViewSmoke) inside a real SDL X11 window under Xvfb: `assert`
  # (two-way messaging: page->host + host->page + navigation + JS execution) and `assert-autosize`
  # (the WebViewContentSizer content->host channel). Each exits 0/1 deterministically (it _exit()s
  # past WebKitGTK's atexit teardown, which otherwise aborts with 134). The harness SKIPs (exit 0)
  # when the display / WebKitGTK / Vulkan stack is
  # unavailable, mirroring BlendOpRegressionTests' Assert.Skip-on-no-ICD. Non-gating for now (not
  # in publish-nuget's needs) until proven stable across runners. If a runner's Mesa does not
  # auto-fall-back to software, add LIBGL_ALWAYS_SOFTWARE=1 + WEBKIT_DISABLE_DMABUF_RENDERER=1 below.
  webview-smoke-linux:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        runner: [ubuntu-latest, ubuntu-24.04-arm]
    runs-on: ${{ matrix.runner }}
    steps:
    - uses: actions/checkout@v4
    # Plain apt-get (not cache-apt-pkgs-action): the cache action installs only the named packages
    # without their dependencies, so mesa-vulkan-drivers landed without the driver libs its ICD needs
    # -> "vkCreateInstance: Found no drivers" (-9). apt-get resolves dependencies and installs the ICD.
    - name: Install WebKitGTK + software Vulkan + Xvfb
      run: |
        sudo apt-get update
        sudo apt-get install -y mesa-vulkan-drivers libvulkan1 libgtk-3-0 libwebkit2gtk-4.1-0 xvfb
    - uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x
    - name: Install Android workload
      # WebViewSmoke references the renderer, whose restore resolves the net10.0-android TFM.
      run: dotnet workload install android
    - name: WebView messaging self-test (headless via Xvfb)
      run: >-
        xvfb-run -a -s "-screen 0 1280x800x24"
        env SDL_VIDEODRIVER=x11
        dotnet run --project tools/WebViewSmoke/WebViewSmoke.csproj -f net10.0 -c $BUILD_CONF assert
    - name: WebView content-sizer self-test (headless via Xvfb)
      # Exercises WebViewContentSizer: the page reports its content height (content->host), and the
      # assert proves the height shrinks below the initial once the box is shrunk — i.e. shrink-to-fit
      # below the webview viewport works. Same skip-on-no-GUI / deterministic-exit semantics as above.
      run: >-
        xvfb-run -a -s "-screen 0 1280x800x24"
        env SDL_VIDEODRIVER=x11
        dotnet run --project tools/WebViewSmoke/WebViewSmoke.csproj -f net10.0 -c $BUILD_CONF assert-autosize

  publish-nuget:
    needs: [build, test]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
    - name: Download NuGet packages
      uses: actions/download-artifact@v4
      with:
        name: nuget-packages
    - name: Push NuGet package
      run: dotnet nuget push **/*.nupkg -s nuget.org -k ${{ secrets.NUGET_API_KEY }}
